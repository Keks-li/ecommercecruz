version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cruzaro_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-cruzaro_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cruzaro_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cruzaro_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DB_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-cruzaro_db}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cruzaro_network
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:

networks:
  cruzaro_network:
    driver: bridge
